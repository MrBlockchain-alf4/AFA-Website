<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AFA Booking Extension — Preview</title>
  <style>
    body { background:#09090b; display:flex; align-items:flex-end; justify-content:flex-end; min-height:100vh; padding:20px; margin:0; font-family:sans-serif; }
    /* Voiceflow chat bubble shell mockup */
    .vf-shell {
      width:370px; height:580px;
      background:#111113; border:1px solid rgba(255,255,255,.08);
      border-radius:20px; overflow:hidden;
      display:flex; flex-direction:column;
      box-shadow:0 24px 64px rgba(0,0,0,.6);
    }
    .vf-topbar {
      background:#141418; border-bottom:1px solid rgba(255,255,255,.07);
      padding:14px 18px; display:flex; align-items:center; gap:10px; flex-shrink:0;
    }
    .vf-avatar {
      width:32px; height:32px; border-radius:50%;
      background:linear-gradient(135deg,#00bbfd,#0080b0);
      display:flex; align-items:center; justify-content:center;
      font-weight:800; font-size:13px; color:#08090a;
    }
    .vf-name { color:#f4f4f5; font-size:13px; font-weight:700; }
    .vf-status { font-size:10px; color:#22c55e; display:flex; align-items:center; gap:4px; }
    .vf-status::before { content:''; width:5px; height:5px; border-radius:50%; background:#22c55e; display:block; }
    .vf-messages {
      flex:1; overflow-y:auto; padding:14px 12px; display:flex; flex-direction:column; gap:10px;
      scrollbar-width:thin; scrollbar-color:rgba(255,255,255,.1) transparent;
    }
    .vf-messages::-webkit-scrollbar { width:4px; }
    .vf-messages::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:2px; }
    /* Bot message bubble */
    .bot-bubble {
      background:#1a1a20; border:1px solid rgba(255,255,255,.07);
      border-radius:14px 14px 14px 4px; padding:10px 13px;
      font-size:13px; color:#a1a1aa; line-height:1.6; max-width:85%;
    }
    /* Extension container — this is what Voiceflow passes as `element` */
    .ext-container { width:100%; }
    .vf-input-bar {
      background:#141418; border-top:1px solid rgba(255,255,255,.07);
      padding:10px 14px; display:flex; gap:8px; align-items:center; flex-shrink:0;
    }
    .vf-input { flex:1; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); border-radius:10px; padding:9px 12px; color:#f4f4f5; font-size:12px; outline:none; }
    .vf-send { width:32px; height:32px; border-radius:8px; background:#00bbfd; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  </style>
  <!-- Load the extension -->
  <script src="/booking-calendar-extension.js"></script>
</head>
<body>

<div class="vf-shell">
  <div class="vf-topbar">
    <div class="vf-avatar">A</div>
    <div>
      <div class="vf-name">AFA Assistant</div>
      <div class="vf-status">Online</div>
    </div>
  </div>

  <div class="vf-messages" id="messages">
    <div class="bot-bubble">Guten Tag! Ich habe alle deine Angaben. Wähle jetzt deinen Wunschtermin für das Gespräch.</div>
    <!-- Extension renders here -->
    <div class="ext-container" id="ext-target"></div>
  </div>

  <div class="vf-input-bar">
    <input class="vf-input" placeholder="Nachricht eingeben…" disabled>
    <button class="vf-send">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#08090a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script>
  // Simulate what Voiceflow sends when the bot fires ext_booking_calendar
  var fakeTrace = {
    type: 'ext_booking_calendar',
    payload: {
      name:        'booking_calendar',
      vorname:     'DD',
      nachname:    'BB',
      email:       'info@afa-ai.com',
      telefon:     '2828282',
      unternehmen: 'gg',
      interesse:   'Premium Website',
    }
  };

  // Simulate voiceflow.chat.interact — logs what would be sent back to Voiceflow
  window.voiceflow = {
    chat: {
      interact: function(data) {
        console.log('[Voiceflow] interact:', JSON.stringify(data, null, 2));
        // In production this continues the bot flow; in preview it just logs
      }
    }
  };

  // Render the extension into the target element
  var target = document.getElementById('ext-target');
  window.VFBookingCalendar.render({ trace: fakeTrace, element: target });

  // Auto-scroll to bottom when content changes
  var msgs = document.getElementById('messages');
  var observer = new MutationObserver(function(){ msgs.scrollTop = msgs.scrollHeight; });
  observer.observe(target, { childList:true, subtree:true, characterData:true });
</script>
</body>
</html>
